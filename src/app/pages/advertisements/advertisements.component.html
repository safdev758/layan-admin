<div class="stack">
  <div class="row header-row">
    <div>
      <h2 class="page-title">Advertisements</h2>
      <p class="muted" style="font-size:14px;">Manage ad creatives shown in the mobile app.</p>
    </div>
    <button class="btn btn-primary create-btn" (click)="showForm = !showForm" style="padding:10px 20px;">
      <svg *ngIf="!showForm" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      <svg *ngIf="showForm" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
      {{ showForm ? 'Close Form' : 'New Advertisement' }}
    </button>
  </div>

  <div *ngIf="errorMessage" class="card notice notice-error">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    {{ errorMessage }}
  </div>

  <div *ngIf="isLoading" class="spinner-container">
    <div class="spinner"></div>
  </div>

  <div *ngIf="showForm" class="card form-card" style="animation:fadeInUp 0.3s ease-out;">
    <div class="card-body">
      <h3 class="form-title">Create Advertisement</h3>
      <form (ngSubmit)="createAd()">
        <div class="field">
          <label class="field-label">Image</label>
          <input class="input" type="file" (change)="onFileSelected($event)" accept="image/*" style="width:100%;">
        </div>
        <div *ngIf="previewUrl" class="preview-wrap">
          <img [src]="previewUrl" alt="Advertisement preview">
        </div>
        <div class="field">
          <label class="field-label">Description</label>
          <textarea class="input" [(ngModel)]="newAd.description" name="description" rows="4" required
            style="width:100%;" placeholder="Write a short description for this ad..."></textarea>
        </div>
        <div class="row form-actions">
          <button class="btn btn-ghost" type="button" (click)="showForm = false">Cancel</button>
          <button class="btn btn-primary" type="submit"
            [disabled]="!newAd.imageBase64 || !newAd.description || isSubmitting" style="padding:10px 20px;">
            <span *ngIf="!isSubmitting">Create Advertisement</span>
            <span *ngIf="isSubmitting" class="spinner" style="width:16px; height:16px; border-width:2px;"></span>
            <span *ngIf="isSubmitting">Creating…</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <div *ngIf="!isLoading && ads.length > 0" class="ads-grid">
    <article *ngFor="let ad of ads" class="card ad-card">
      <div class="ad-image-wrap">
        <img [src]="ad.imageBase64" [alt]="ad.description">
      </div>
      <div class="ad-body">
        <div class="row ad-meta">
          <span class="muted" style="font-size:12px;">{{ ad.createdAt | date:'mediumDate' }}</span>
          <span class="badge" [ngClass]="ad.isActive ? 'badge-green' : 'badge-red'">
            <span
              style="width:5px; height:5px; border-radius:50%; background:currentColor; margin-right:5px;"></span>
            {{ ad.isActive ? 'Active' : 'Inactive' }}
          </span>
        </div>
        <p class="ad-description">{{ ad.description }}</p>
        <div class="row ad-actions">
          <button class="btn btn-ghost action-btn" (click)="toggleAd(ad)">
            {{ ad.isActive ? 'Deactivate' : 'Activate' }}
          </button>
          <button class="btn btn-ghost action-btn danger-btn" (click)="deleteAd(ad)">Delete</button>
        </div>
      </div>
    </article>
  </div>

  <div *ngIf="!isLoading && ads.length === 0 && !showForm" class="card empty-card">
    <div class="empty-state-icon" style="margin:0 auto 16px;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="opacity:0.5;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" />
      </svg>
    </div>
    <h3 style="margin:0 0 8px; color:var(--text); font-weight:600;">No advertisements found</h3>
    <p class="muted" style="margin:0 0 20px; font-size:14px;">Create your first advertisement to get started.</p>
    <button class="btn btn-primary" (click)="showForm = true">New Advertisement</button>
  </div>
</div>
