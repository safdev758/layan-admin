<div>
  <h2>Categories</h2>
  <div *ngIf="error" style="color:#c00;">{{ error }}</div>
  <div *ngIf="loading">Loading...</div>

  <form (ngSubmit)="create()" style="display:flex;gap:8px;align-items:center;margin:12px 0;">
    <input [(ngModel)]="name" name="name" placeholder="Category name" required />
    <input [(ngModel)]="description" name="description" placeholder="Description (optional)" />
    <button type="submit">Create</button>
  </form>

  <table *ngIf="!loading" border="1" cellspacing="0" cellpadding="6">
    <thead>
      <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of categories">
        <td>{{ c.name }}</td>
        <td>{{ c.description }}</td>
        <td><button (click)="remove(c)">Delete</button></td>
      </tr>
    </tbody>
  </table>
</div>
